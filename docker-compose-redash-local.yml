version: "3.8"
# 此為 docker-compose 版本（非 swarm）
# 與 docker-compose-redash.yml 主要差異：
# 1. 移除 deploy 區塊（deploy 為 swarm 專用，包含 replicas、placement constraints）
# 2. 啟動指令使用 docker compose -f docker-compose-redash-local.yml up -d
# 啟動前需先建立外部網路：docker network create my_network
# 與 crawler/mysql.yml 共用同一個 my_network，方便 redash 串接 mysql
services:
  redash:
    # 選用此版本的 redash image
    image: redash/redash:10.1.0.b50633
    # depends 代表依賴關係
    # 需要等 postgres、redis 先架設完成
    # 才會開始架設 redash services
    depends_on:
      - postgres
      - redis
    restart: always
    # redash 啟動 server 指令
    command: server
    # redash 使用 5000 port
    # 將容器內的 5000 port 對應到本機的 5005 port
    # 瀏覽器可透過 http://localhost:5005 連線
    ports:
      - "5005:5000"
    # 相關的環境變數
    environment:
      PYTHONUNBUFFERED: 0
      # log 等級
      REDASH_LOG_LEVEL: INFO
      # redis 的連線設定
      # 注意：在 docker-compose 中，service 之間直接以 service 名稱連線
      # 因此這裡使用 redis（service 名稱），而非 redash_redis
      REDASH_REDIS_URL: redis://redis:6379/0
      # postgres 的密碼
      POSTGRES_PASSWORD: postgres_password
      REDASH_COOKIE_SECRET: redash_cookie_secret
      REDASH_SECRET_KEY: redash_secret_key
      # postgres 的連線設定
      # 同樣使用 service 名稱 postgres 來連線
      REDASH_DATABASE_URL: postgresql://postgres:postgres_password@postgres/postgres
      # 允許在 redash 上使用 python
      REDASH_ADDITIONAL_QUERY_RUNNERS: redash.query_runner.python
      # worker 數量
      # 這是做範例，設定 1，
      # 未來可根據需求自行增加
      REDASH_WEB_WORKERS: 1
      # 修正 mysql 斷線問題
      SQLALCHEMY_ENABLE_POOL_PRE_PING: "True"
    networks:
        - my_network

  create_table:
    # 相關設定與 redash services 相同
    # 也用相同的 image
    image: redash/redash:10.1.0.b50633
    depends_on:
      - postgres
      - redis
    restart: on-failure  # 若失敗則自動重啟
    # 主要差異在此
    # 初始化需要建立 table
    # 建立完成後，此 container 會自行結束
    # 可使用 docker compose rm -f create_table 移除
    command: python /app/manage.py database create_tables
    environment:
      PYTHONUNBUFFERED: 0
      REDASH_LOG_LEVEL: INFO
      REDASH_REDIS_URL: redis://redis:6379/0
      POSTGRES_PASSWORD: postgres_password
      REDASH_COOKIE_SECRET: redash_cookie_secret
      REDASH_SECRET_KEY: redash_secret_key
      REDASH_DATABASE_URL: postgresql://postgres:postgres_password@postgres/postgres
      REDASH_ADDITIONAL_QUERY_RUNNERS: redash.query_runner.python
      REDASH_WEB_WORKERS: 1
      # 修正 mysql 斷線問題
      SQLALCHEMY_ENABLE_POOL_PRE_PING: "True"
    networks:
        - my_network

  scheduler:
    # 用於 redash 相關的 scheduler 排程
    image: redash/redash:10.1.0.b50633
    depends_on:
      - postgres
      - redis
    restart: always
    command: scheduler
    environment:
      PYTHONUNBUFFERED: 0
      REDASH_LOG_LEVEL: INFO
      REDASH_REDIS_URL: redis://redis:6379/0
      POSTGRES_PASSWORD: postgres_password
      REDASH_COOKIE_SECRET: redash_cookie_secret
      REDASH_SECRET_KEY: redash_secret_key
      REDASH_DATABASE_URL: postgresql://postgres:postgres_password@postgres/postgres
      REDASH_ADDITIONAL_QUERY_RUNNERS: redash.query_runner.python
      # 這裡的 celery 就跟前面章節提到的
      # 分散式概念一樣
      QUEUES: "celery"
      WORKERS_COUNT: 1
      # 修正 mysql 斷線問題
      SQLALCHEMY_ENABLE_POOL_PRE_PING: "True"
    networks:
        - my_network

  scheduled_worker:
    # 分散式中的 worker
    image: redash/redash:10.1.0.b50633
    depends_on:
      - postgres
      - redis
    restart: always
    command: worker
    environment:
      PYTHONUNBUFFERED: 0
      REDASH_LOG_LEVEL: INFO
      REDASH_REDIS_URL: redis://redis:6379/0
      POSTGRES_PASSWORD: postgres_password
      REDASH_COOKIE_SECRET: redash_cookie_secret
      REDASH_SECRET_KEY: redash_secret_key
      REDASH_DATABASE_URL: postgresql://postgres:postgres_password@postgres/postgres
      REDASH_ADDITIONAL_QUERY_RUNNERS: redash.query_runner.python
      # 負責處理 queue = scheduled_queries,schemas 類型的任務
      # 與本書中 7.6.3，crawler.yml 中的 -Q twse 概念一樣
      QUEUES: "scheduled_queries,schemas"
      WORKERS_COUNT: 1
      # 修正 mysql 斷線問題
      SQLALCHEMY_ENABLE_POOL_PRE_PING: "True"
    networks:
        - my_network

  adhoc_worker:
    image: redash/redash:10.1.0.b50633
    depends_on:
      - postgres
      - redis
    restart: always
    command: worker
    environment:
      PYTHONUNBUFFERED: 0
      REDASH_LOG_LEVEL: INFO
      REDASH_REDIS_URL: redis://redis:6379/0
      POSTGRES_PASSWORD: postgres_password
      REDASH_COOKIE_SECRET: redash_cookie_secret
      REDASH_SECRET_KEY: redash_secret_key
      REDASH_DATABASE_URL: postgresql://postgres:postgres_password@postgres/postgres
      REDASH_ADDITIONAL_QUERY_RUNNERS: redash.query_runner.python
      # 負責處理 queue = queries 類型的任務
      # 與本書中 7.6.3，crawler.yml 中的 -Q twse 概念一樣
      QUEUES: "queries"
      WORKERS_COUNT: 2
      # 修正 mysql 斷線問題
      SQLALCHEMY_ENABLE_POOL_PRE_PING: "True"
    networks:
        - my_network

  redis:
    # redis 資料庫
    image: redis:5.0
    restart: always
    volumes:
      - redis-redash:/bitnami/redis/data
    networks:
        - my_network

  postgres:
    # postgres 資料庫
    image: postgres:9.6-alpine
    environment:
      PYTHONUNBUFFERED: 0
      REDASH_LOG_LEVEL: INFO
      REDASH_REDIS_URL: redis://redis:6379/0
      POSTGRES_PASSWORD: postgres_password
      REDASH_COOKIE_SECRET: redash_cookie_secret
      REDASH_SECRET_KEY: redash_secret_key
      REDASH_DATABASE_URL: postgresql://postgres:postgres_password@postgres/postgres
      REDASH_ADDITIONAL_QUERY_RUNNERS: redash.query_runner.python
    volumes:
      # postgres 資料持久化
      # 即便 container 刪除，資料仍會保留
      - postgres:/var/lib/postgresql/data
    restart: always
    networks:
        - my_network

  nginx:
    # 網頁伺服器
    image: redash/nginx:latest
    depends_on:
      - redash
    restart: always
    # nginx 預設使用 80 port
    # 對應到本機的 80 port
    # 瀏覽器可透過 http://localhost 連線
    ports:
      - "80:80"
    networks:
        - my_network

# network 設定
# 使用 external: true 加入已存在的 my_network
# 需事先執行 docker network create my_network 建立網路
# 這樣才能與 crawler/mysql.yml 等其他 compose 檔案共用同一個網路
# 讓 redash 可以連線到 mysql 等其他 service
networks:
  my_network:
    external: true

# volumes 設定
# 讓資料持久化，避免 container 刪除後資料遺失
volumes:
  postgres:

  redis-redash:
